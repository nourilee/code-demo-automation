name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Opt into Node 24 for JavaScript-based actions to avoid upcoming deprecation noise.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npx playwright test

      # Upload the HTML report and the raw artifacts for debugging.
      # `if: always()` ensures you still get the report even if tests fail.
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
          if-no-files-found: error

      - name: Upload test results (traces/videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          retention-days: 14
          # When tests pass, Playwright may not create this folder.
          if-no-files-found: ignore

      # Publish the HTML report to GitHub Pages on pushes to main.
      # This keeps PR runs lightweight while still giving you a public, always-updated report.
      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/configure-pages@v5
        # Pages site enablement must be done once in repo settings.
        # This workflow only configures and deploys after Pages is enabled.

      - name: Upload report to Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

  deploy:
    # Only deploy from main branch pushes.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
